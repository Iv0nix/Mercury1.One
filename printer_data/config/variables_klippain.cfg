[gcode_macro _USER_VARIABLES]
# --- VERBOSE & DEBUG ---
variable_verbose: True

###################################################
# 1. HARDWARE MAPPING (HIER DEINE NAMEN EINTRAGEN)
###################################################
## Aktiviere hier, was du am Drucker verbaut hast
variable_filter_enabled: False          # Auf True setzen, falls Filter vorhanden
variable_filter_name: "filter_fan"      # Name deines [fan_generic ...]

variable_light_enabled: False           # Auf True setzen, falls Licht vorhanden
variable_caselight_name: "caselight"    # Name deines [output_pin ...]

variable_status_leds_enabled: False     # Auf True setzen, falls Neopixel (Stealthburner etc.)
variable_status_led_name: "status_leds" # Name deines [neopixel ...]

variable_chamber_temperature_sensor_enabled: False
variable_chamber_temperature_sensor_name: "chamber" # Name deines [temperature_sensor ...]

variable_filament_sensor_enabled: False
variable_filament_sensor_name: "runout_sensor"

variable_zcalib_plugin_enabled: False   # Nur True, wenn du das Auto-Z-Calibration Plugin nutzt
variable_probe_type_enabled: "inductive" # "vorontap" oder "inductive"

# --- ABLAUFSTEUERUNG ---
# Hier kannst du die Reihenfolge des START_PRINT festlegen:
variable_startprint_actions: "bed_soak", "tilt_calib", "extruder_preheating", "bedmesh", "extruder_heating", "primeline"

###################################################
# 2. SPEEDS & ACCELS (Dein Original)
###################################################
variable_homing_travel_speed: 350
variable_travel_speed: 350
variable_z_drop_speed: 15
variable_brush_clean_speed: 100
variable_probe_dock_speed: 60

variable_homing_travel_accel: 3000
variable_tilting_travel_accel: 3000
variable_brush_clean_accel: 1500
variable_probe_dock_accel: 2000

###################################################
# 3. START / END PRINT CONFIG (Dein Original)
###################################################
variable_zendstop_position: -1, -1 
variable_force_homing_in_start_print: False
variable_homing_zhop: 8
variable_homing_first: "X" 
variable_homing_backoff_distance_xy: -10, -10
variable_safe_extruder_temp: 150

## Prime line
variable_prime_line_xy: 5, 5 
variable_prime_line_direction: "X" 
variable_prime_line_length: 40 
variable_prime_line_purge_distance: 30 
variable_prime_line_flowrate: 10 
variable_prime_line_height: 0.6 
variable_prime_line_margin: 5  
variable_prime_line_wipe: False 

## Park & Retract
variable_retract_length: 20
variable_unretract_length: 23
variable_park_position_xy: 378, 399
variable_park_lift_z: 50
variable_disable_motors_in_end_print: False
variable_turn_off_heaters_in_end_print: True

###################################################
# 4. MATERIAL PARAMETERS (Dein Original)
###################################################
variable_print_default_bed_temp: 60
variable_print_default_extruder_temp: 200
variable_print_default_chamber_temp: 0
variable_print_default_chamber_max_heating_time: 15
variable_print_default_soak: 8
variable_print_default_material: "PLA"

variable_material_parameters: {
        'PLA': {'pressure_advance': 0.04, 'retract_length': 0.75, 'unretract_extra_length': 0, 'retract_speed': 40, 'unretract_speed': 30, 'filter_speed': 0, 'additional_z_offset': 0, 'filament_sensor': 1},
        'PET': {'pressure_advance': 0.0650, 'retract_length': 1.4, 'unretract_extra_length': 0, 'retract_speed': 30, 'unretract_speed': 20, 'filter_speed': 0, 'additional_z_offset': 0.020, 'filament_sensor': 1},
        'ABS': {'pressure_advance': 0.0480, 'retract_length': 0.5, 'unretract_extra_length': 0, 'retract_speed': 40, 'unretract_speed': 30, 'filter_speed': 80, 'additional_z_offset': 0, 'filament_sensor': 1},
        'TPU': {'pressure_advance': 0.0500, 'retract_length': 0.2, 'unretract_extra_length': 0, 'retract_speed': 5, 'unretract_speed': 5, 'filter_speed': 0, 'additional_z_offset': 0.040, 'filament_sensor': 0}
    }

###################################################
# 5. BRUSH & PURGE (Dein Original)
###################################################
variable_purge_and_brush_enabled: False
variable_brush_xyz: -1, -1, -1 
variable_purge_bucket_xyz: -1, -1, -1 
variable_purge_distance: 30 
variable_brush_width_x: 40 
variable_brushes: 6 

# Diese Zeilen für Kompatibilität mit den Modulen (neu hinzugefügt)
variable_bed_mesh_enabled: True
variable_firmware_retraction_enabled: True
variable_light_intensity_start_print: 100
variable_light_intensity_printing: 30

gcode:
    # Leer lassen

[save_variables]
filename: ~/printer_data/config/save_variables.cfg